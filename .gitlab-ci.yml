workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH

stages:
  - lint
  - build
  - package
  - deploy

.base:
  tags:
    - runner-amd64

.base-cargo:
  extends: .base
  image: registry.ulbricht.casa/docker-images/arch-linux-plasma-build:latest
  variables:
    CARGO_HOME: $CI_PROJECT_DIR/.cargo
    QMAKE: /bin/qmake6

lint:
  extends: .base-cargo
  stage: lint
  script:
    - cargo clippy --release --all-features --bins

build:
  extends: .base-cargo
  stage: build
  script:
    - cargo build --release --all-features --bins

package:
  extends: .base
  image: registry.ulbricht.casa/docker-images/arch-linux-plasma-build:latest
  stage: package
  variables:
    ARCH: amd64
    UC_PACKAGED_FILE: jewels-$CI_COMMIT_TAG-$REL-x86_64.pkg.tar.zst
    UC_TAG: $CI_COMMIT_TAG
    REL: 1
  script:
    - cp -r $CI_PROJECT_DIR/* $HOME
    - cd $HOME
    - cargo build --release --all-features --bins
    - makepkg
    - curl --fail-with-body --request PUT --user "$UC_FORGEJO_USER:$UC_FORGEJO_KEY" https://packages.ulbricht.casa/api/packages/family/arch/family --upload-file "$UC_PACKAGED_FILE"
  artifacts:
    paths:
      - $UC_PACKAGED_FILE
  rules:
    - if: $CI_COMMIT_TAG

